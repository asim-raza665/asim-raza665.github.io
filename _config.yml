external:
  - {title: "Email", icon: envelope, url: "mailto:gondalasim665@gmail.com"}
  - {title: "GitHub", icon: github, url: "https://github.com/asim-raza665"}

footer:
  - {file: "about.md", title: "About"}
  - {file: "blog.md", title: "Articles"}
  - {file: "categories.md", title: "Categories"}
  - {file: "tags.md", title: "Tags"}

comments:

