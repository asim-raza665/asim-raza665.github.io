<nav class="post-navigation" aria-label="Article navigation">
  {% if page.previous %}
  <a class="post-navigation__link post-navigation__link--previous" href="{{ page.previous.url | relative_url }}">
    <span class="post-navigation__label">Previous Article</span>
    <strong>{{ page.previous.title }}</strong>
  </a>
  {% else %}
  <span class="post-navigation__link post-navigation__link--empty">
    <span class="post-navigation__label">Previous Article</span>
    <strong>No earlier article</strong>
  </span>
  {% endif %}

  {% if page.next %}
  <a class="post-navigation__link post-navigation__link--next" href="{{ page.next.url | relative_url }}">
    <span class="post-navigation__label">Next Article</span>
    <strong>{{ page.next.title }}</strong>
  </a>
  {% else %}
  <span class="post-navigation__link post-navigation__link--empty">
    <span class="post-navigation__label">Next Article</span>
    <strong>No newer article</strong>
  </span>
  {% endif %}
</nav>
