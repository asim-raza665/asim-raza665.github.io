---
layout: default
---
<article class="page-card{% if page.body_class %} {{ page.body_class }}{% endif %}">
  {% if page.title and page.title != "Home" %}
  <header class="page-hero">
    <p class="eyebrow">Portfolio Section</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="page-lead">{{ page.description }}</p>{% endif %}
  </header>
  {% endif %}
  {{ content }}
</article>
